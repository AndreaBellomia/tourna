services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: tourna
      MINIO_ROOT_PASSWORD: tourna-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 tourna tourna-secret; do sleep 1; done;
      mc mb --ignore-existing local/tourna-public-assets;
      mc mb --ignore-existing local/tourna-private-assets;
      mc anonymous set download local/tourna-public-assets;
      "

  mailpit:
    image: axllent/mailpit:v1.27
    restart: always
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
  miniodata:
