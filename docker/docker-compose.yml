services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  mailpit:
    image: axllent/mailpit:v1.27
    restart: always
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
